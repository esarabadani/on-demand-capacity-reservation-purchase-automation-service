# Minimal nginx server config for the capacity reservation dashboard.
# nginx just serves a single static file that render-dashboard.ps1 regenerates
# every minute.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;
    server_name _;

    location / {
        try_files $uri $uri/ =404;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
